<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gina Decor — склад</title>
<style>
  :root{ --cobalt:#1B3A6B; --gold:#B0872E; --green:#2E9E57; --porc:#F4F6F8; --ink:#1A1D22; --mute:#6B7480; --line:#E2E6EB; }
  *{ box-sizing:border-box; margin:0; -webkit-tap-highlight-color:transparent; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--porc); color:var(--ink); }
  .serif{ font-family:Georgia,'Times New Roman',serif; }
  header{ background:var(--cobalt); color:#fff; padding:15px 16px 13px; padding-top:max(15px,env(safe-area-inset-top)); }
  .eyebrow{ font-size:11px; letter-spacing:2.5px; text-transform:uppercase; opacity:.75; font-weight:600; }
  .stats{ display:flex; gap:18px; margin-top:8px; align-items:flex-end; }
  .stat .n{ font-family:Georgia,serif; font-size:26px; font-weight:700; }
  .stat .l{ font-size:11px; opacity:.85; }
  .bar{ padding:12px 16px 0; position:sticky; top:0; background:var(--porc); z-index:5; }
  .searchwrap{ display:flex; gap:8px; }
  .search{ flex:1; position:relative; }
  .search input{ width:100%; padding:10px 12px; border-radius:11px; border:1px solid var(--line); font-size:15px; background:#fff; }
  input:focus,textarea:focus{ outline:none; border-color:var(--cobalt); }
  .btn{ border:none; border-radius:11px; font-weight:700; cursor:pointer; font-size:14px; }
  .btn-primary{ background:var(--cobalt); color:#fff; padding:0 14px; display:flex; align-items:center; gap:5px; }
  .chips{ display:flex; gap:7px; margin-top:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ padding:7px 14px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; border:1px solid var(--line); background:#fff; color:var(--ink); }
  .chip.on{ color:#fff; }
  .list{ padding:2px 16px 90px; }
  .card{ display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:10px; margin-top:9px; }
  .card.sold{ opacity:.62; }
  .thumb{ width:56px; height:56px; flex-shrink:0; border-radius:11px; overflow:hidden; background:#EEF1F4; display:flex; align-items:center; justify-content:center; border:1px solid var(--line); }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .info{ flex:1; min-width:0; }
  .name{ font-weight:700; font-size:15px; }
  .name .m{ font-weight:400; color:var(--mute); }
  .sub{ font-size:12.5px; color:var(--mute); margin-top:2px; }
  .sub b{ color:var(--cobalt); }
  .check{ width:40px; height:40px; flex-shrink:0; border-radius:12px; cursor:pointer; border:2px solid #CBD2DA; background:#fff; display:flex; align-items:center; justify-content:center; }
  .check.on{ border-color:var(--green); background:var(--green); }
  .check svg{ width:22px; height:22px; }
  .strike{ text-decoration:line-through; }
  .fab{ position:fixed; left:16px; right:16px; bottom:max(14px,env(safe-area-inset-bottom)); display:flex; gap:10px; z-index:20; }
  .fab .btn{ padding:13px; flex:1; display:flex; align-items:center; justify-content:center; gap:7px; box-shadow:0 4px 14px rgba(20,30,50,.18); }
  .ghost{ background:#fff; color:var(--cobalt); border:1px solid var(--line); }
  .overlay{ position:fixed; inset:0; background:rgba(20,25,35,.55); z-index:50; display:flex; align-items:flex-end; justify-content:center; }
  .sheet{ background:var(--porc); width:100%; max-width:560px; border-radius:20px 20px 0 0; max-height:92vh; overflow-y:auto; padding-bottom:max(16px,env(safe-area-inset-bottom)); }
  .sheet-head{ display:flex; justify-content:space-between; align-items:center; padding:14px 16px; }
  .x{ border:none; background:#E7EAEE; border-radius:999px; width:32px; height:32px; cursor:pointer; font-size:16px; }
  .photo-big{ margin:0 16px; border-radius:16px; overflow:hidden; background:#E7EAEE; aspect-ratio:4/3; display:flex; align-items:center; justify-content:center; }
  .photo-big img{ width:100%; height:100%; object-fit:cover; }
  .field{ margin:0 16px 12px; }
  .field label{ font-size:11px; color:var(--mute); font-weight:600; margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; display:block; }
  .field input{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line); font-size:15px; background:#fff; }
  .row2{ display:flex; gap:10px; margin:0 16px 12px; }
  .row2 .field{ margin:0; flex:1; }
  .big-toggle{ width:calc(100% - 32px); margin:6px 16px 14px; padding:13px; border-radius:12px; border:none; cursor:pointer; font-weight:700; font-size:15px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .del{ width:calc(100% - 32px); margin:8px 16px 4px; padding:11px; border-radius:11px; border:1px solid #F0C9C9; background:#fff; color:#B2453C; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .muted-note{ color:var(--mute); font-size:12.5px; padding:6px 16px; }
  .hidden{ display:none; }
  .empty{ text-align:center; color:var(--mute); padding:40px; }
</style>

const eur = n => "€" + new Intl.NumberFormat("nl-NL",{maximumFractionDigits:0}).format(Math.round(n||0));
let DB=null, items=[], photos={}, q="", filter="all", pickTarget=null;

/* ---------- IndexedDB ---------- */
function idb(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open("ginadecor",1);
    r.onupgradeneeded=e=>{ const db=e.target.result;
      if(!db.objectStoreNames.contains("items")) db.createObjectStore("items",{keyPath:"id"});
      if(!db.objectStoreNames.contains("photos")) db.createObjectStore("photos"); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
function tx(store,mode){ return DB.transaction(store,mode).objectStore(store); }
function put(store,val,key){ return new Promise((res,rej)=>{ const r=key!==undefined?tx(store,"readwrite").put(val,key):tx(store,"readwrite").put(val); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function del(store,key){ return new Promise((res,rej)=>{ const r=tx(store,"readwrite").delete(key); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function getAll(store){ return new Promise((res,rej)=>{ const r=tx(store,"readonly").getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function getKeysVals(store){ return new Promise((res,rej)=>{ const out={}; const c=tx(store,"readonly").openCursor(); c.onsuccess=e=>{ const cur=e.target.result; if(cur){ out[cur.key]=cur.value; cur.continue(); } else res(out); }; c.onerror=()=>rej(c.error); }); }

/* ---------- init ---------- */
async function init(){
  try{ DB=await idb(); }
  catch(e){ document.body.innerHTML="<p style='padding:24px'>Браузер не даёт хранилище. Открой файл через ссылку (хостинг), а не двойным кликом — тогда всё заработает.</p>"; return; }
  items=await getAll("items");
  if(!items.length){ for(const it of SEED) await put("items",it); items=SEED.slice(); }
  photos=await getKeysVals("photos");
  render();
}

/* ---------- image shrink ---------- */
function shrink(file){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let {width,height}=img; const s=Math.min(1,1000/Math.max(width,height));
      width=Math.round(width*s); height=Math.round(height*s);
      const c=document.createElement("canvas"); c.width=width; c.height=height;
      c.getContext("2d").drawImage(img,0,0,width,height);
      let q=0.55,out=c.toDataURL("image/jpeg",q);
      while(out.length>1400000&&q>0.3){ q-=0.1; out=c.toDataURL("image/jpeg",q); }
      res(out);
    };
    img.onerror=rej; img.src=url;
  });
}

/* ---------- data ops ---------- */
async function saveItem(it){ await put("items",it); const i=items.findIndex(x=>x.id===it.id); if(i>=0) items[i]=it; else items.unshift(it); }
async function toggleSold(id){ const it=items.find(x=>x.id===id); it.sold=!it.sold; await saveItem(it); render(); }
async function attachPhoto(id,file){ if(!file) return; const data=await shrink(file); photos[id]=data; await put("photos",data,id); const it=items.find(x=>x.id===id); it.photo=true; await saveItem(it); render(); if(openId===id) openDetail(id); }
async function dropPhoto(id){ delete photos[id]; await del("photos",id); const it=items.find(x=>x.id===id); it.photo=false; await saveItem(it); render(); openDetail(id); }
async function addItem(d){ const id=(items.reduce((m,x)=>Math.max(m,x.id),0)||0)+1; const it={id,sold:false,photo:false,...d}; await saveItem(it); closeModal(); render(); openDetail(id); }
async function removeItem(id){ await del("items",id); await del("photos",id); delete photos[id]; items=items.filter(x=>x.id!==id); closeModal(); render(); }

/* ---------- export / import ---------- */
async function exportData(){
  const payload={ v:1, exported:new Date().toISOString(), items, photos };
  const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="gina-decor-backup-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(a.href);
}
async function importData(file){
  if(!file) return;
  if(!confirm("Заменить текущую базу данными из файла?")) return;
  const text=await file.text(); let p; try{ p=JSON.parse(text); }catch{ alert("Файл не читается"); return; }
  if(!p.items){ alert("Не тот файл"); return; }
  // wipe
  for(const it of items){ await del("items",it.id); }
  for(const k of Object.keys(photos)){ await del("photos",Number(k)); }
  items=[]; photos={};
  for(const it of p.items){ await put("items",it); }
  for(const [k,v] of Object.entries(p.photos||{})){ await put("photos",v,Number(k)); }
  items=await getAll("items"); photos=await getKeysVals("photos");
  render(); alert("Готово. Загружено товаров: "+items.length);
}

/* ---------- render ---------- */
function counts(){ let st=0,stv=0,so=0,sov=0; items.forEach(x=>x.sold?(so++,sov+=+x.price||0):(st++,stv+=+x.price||0)); return {st,stv,so,sov}; }
function render(){
  const c=counts();
  document.getElementById("stStock").textContent=c.st;
  document.getElementById("stStockV").textContent="в наличии · "+eur(c.stv);
  document.getElementById("stSold").textContent=c.so;
  document.getElementById("stSoldV").textContent="продано · "+eur(c.sov);

  const chip=(k,l,n,col)=>`<button class="chip ${filter===k?'on':''}" style="${filter===k?`background:${col};border-color:${col}`:''}" onclick="setFilter('${k}')">${l} · ${n}</button>`;
  document.getElementById("chips").innerHTML=
    chip("all","Все",items.length,"#1B3A6B")+chip("stock","В наличии",c.st,"#1B3A6B")+chip("sold","Продано",c.so,"#2E9E57");

  const t=q.trim().toLowerCase();
  const rows=items.filter(x=>{
    if(filter==="stock"&&x.sold) return false;
    if(filter==="sold"&&!x.sold) return false;
    if(t&&!((x.brand+" "+(x.model||"")+" "+x.piece+" "+x.location).toLowerCase().includes(t))) return false;
    return true;
  });
  const CHECK=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const CHECKO=`<svg viewBox="0 0 24 24" fill="none" stroke="#CBD2DA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const CAM=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#A9B2BC" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;

  document.getElementById("list").innerHTML = rows.length? rows.map(it=>`
    <div class="card ${it.sold?'sold':''}">
      <div class="thumb" onclick="pickPhoto(${it.id})">${photos[it.id]?`<img src="${photos[it.id]}">`:CAM}</div>
      <div class="info" onclick="openDetail(${it.id})">
        <div class="name ${it.sold?'strike':''}">${esc(it.brand)}${it.model?` <span class="m">${esc(it.model)}</span>`:""}</div>
        <div class="sub">${esc(it.piece)} · ${esc(it.location)} · <b>${eur(it.price)}</b></div>
      </div>
      <div class="check ${it.sold?'on':''}" onclick="toggleSold(${it.id})">${it.sold?CHECK:CHECKO}</div>
    </div>`).join("") : `<div class="empty">Ничего не найдено.</div>`;
}
function esc(s){ return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }

/* ---------- photo pick ---------- */
function pickPhoto(id){ pickTarget=id; const p=document.getElementById("picker"); p.value=""; p.onchange=()=>attachPhoto(id,p.files[0]); p.click(); }

/* ---------- search/filter ---------- */
function onSearch(v){ q=v; render(); }
function setFilter(k){ filter=k; render(); }

/* ---------- detail ---------- */
let openId=null;
function openDetail(id){
  openId=id; const it=items.find(x=>x.id===id); if(!it) return;
  const p=photos[id];
  const IMG=`<div class="photo-big">${p?`<img src="${p}">`:`<div style="text-align:center;color:#98A2AD"><div style="font-size:34px">🖼️</div><div style="font-size:13px;margin-top:4px">нет фото</div></div>`}</div>`;
  document.getElementById("modal").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-head"><div style="font-weight:700;font-size:16px">${esc(it.brand)} ${esc(it.model||"")}</div><button class="x" onclick="closeModal()">✕</button></div>
      ${IMG}
      <div style="display:flex;gap:8px;padding:10px 16px 0">
        <button class="btn btn-primary" style="flex:1;justify-content:center;padding:11px" onclick="pickPhoto(${id})">📷 ${p?"Заменить фото":"Добавить фото"}</button>
        ${p?`<button class="btn ghost" style="padding:11px 14px" onclick="dropPhoto(${id})">Убрать</button>`:""}
      </div>
      <button class="big-toggle" style="${it.sold?'background:#E7F6EC;color:#2E9E57':'background:#2E9E57;color:#fff'}" onclick="toggleSold(${id});openDetail(${id})">
        ${it.sold?"↩︎ Вернуть в наличие":"✓ Отметить проданным"}
      </button>
      ${field("Название / бренд","brand",it.brand,id)}
      ${field("Модель / коллекция","model",it.model,id)}
      ${field("Тип","piece",it.piece,id)}
      <div class="row2">
        <div class="field"><label>Цена €</label><input inputmode="decimal" value="${esc(it.price)}" onblur="upd(${id},'price',this.value)"></div>
        <div class="field"><label>Место</label><input value="${esc(it.location)}" onblur="upd(${id},'location',this.value)"></div>
      </div>
      <button class="del" onclick="if(confirm('Удалить товар?'))removeItem(${id})">🗑 Удалить товар</button>
    </div>
  </div>`;
}
function field(label,key,val,id){ return `<div class="field"><label>${label}</label><input value="${esc(val)}" onblur="upd(${id},'${key}',this.value)"></div>`; }
async function upd(id,key,val){ const it=items.find(x=>x.id===id); it[key]=key==="price"?(parseFloat(val)||0):val; await saveItem(it); render(); }
function closeModal(){ openId=null; document.getElementById("modal").innerHTML=""; }

/* ---------- add ---------- */
function openAdd(){
  document.getElementById("modal").innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-head"><div style="font-weight:700;font-size:17px">Новый товар</div><button class="x" onclick="closeModal()">✕</button></div>
      <div class="field"><label>Название / бренд *</label><input id="a_brand" placeholder="напр. Baccarat"></div>
      <div class="field"><label>Модель / коллекция</label><input id="a_model"></div>
      <div class="field"><label>Тип (ваза, сервиз…)</label><input id="a_piece"></div>
      <div class="row2">
        <div class="field"><label>Цена €</label><input id="a_price" inputmode="decimal"></div>
        <div class="field"><label>Место</label><input id="a_location"></div>
      </div>
      <button class="big-toggle" style="background:#1B3A6B;color:#fff" onclick="submitAdd()">Добавить (фото добавишь потом)</button>
    </div>
  </div>`;
}
function submitAdd(){
  const g=id=>document.getElementById(id).value.trim();
  const brand=g("a_brand"); if(!brand){ alert("Впиши хотя бы название"); return; }
  addItem({brand, model:g("a_model"), piece:g("a_piece")||"—", price:parseFloat(g("a_price"))||0, location:g("a_location")||"—"});
}

init();
</script>
</body>
</html>
